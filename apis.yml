aid: integration-os
name: IntegrationOS
segments:
  - Integrations
description: >-
  IntegrationOS was a unified API platform that let developers add third-party
  integrations to their products with a single API call. The company was
  subsequently rebranded as Pica (picaos.com) and the brand has since
  redirected to One (withone.ai), an agent infrastructure platform offering
  authenticated access to 250+ platforms with 50,000+ actions, managed OAuth,
  scheduling, memory, and API knowledge through a unified CLI. This index
  preserves the IntegrationOS history while pointing to the active successor.
type: Index
position: Consumer
access: 3rd-Party
