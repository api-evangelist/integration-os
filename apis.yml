apis:
  - aid: integration-os:successor
    name: One (successor to IntegrationOS / Pica)
    description: >-
      One is the current successor brand to IntegrationOS and Pica. It
      provides agent infrastructure with a unified CLI for 250+ platforms
      and 50,000+ tools, managed OAuth (AuthKit), multi-step Flows, memory,
      and the Bridge feature for converting API documentation into MCP
      servers. The legacy IntegrationOS and docs.integrationos.com domains
      now redirect into the One ecosystem.
